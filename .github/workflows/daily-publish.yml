name: Daily Article Publish

on:
  schedule:
    # 毎日 08:00 JST (= 23:00 UTC 前日) に実行
    - cron: '0 23 * * *'
  # 手動実行も可能
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    outputs:
      article_id: ${{ steps.publish.outputs.article_id }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Publish next article
        id: publish
        run: python3 scripts/publish-next.py

      - name: Commit and push
        if: steps.publish.outputs.article_id != ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/articles.json src/data/article_queue.json
          git commit -m "📝 新記事公開: ${{ steps.publish.outputs.article_title }}"
          git push

      - name: Commit queue cleanup (skip case)
        if: steps.publish.outputs.queue_updated == 'true' && steps.publish.outputs.article_id == ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/article_queue.json
          git diff --staged --quiet || git commit -m "🗑️ キューから公開済み記事を除去"
          git push

  build:
    runs-on: ubuntu-latest
    needs: publish
    if: needs.publish.outputs.article_id != ''

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # 上の publish ジョブのコミットを含む最新を取得
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
